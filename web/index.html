<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>waypoint — where to stay</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --route: #2e7d32; --accept: #1565c0; --marginal: #f9a825; --filter: #b0392b;
    --bg: #14181d; --panel: #1e242c; --ink: #e7ecf2; --muted: #9aa6b2;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font: 15px/1.45 system-ui, sans-serif; color: var(--ink); }
  #app { display: flex; height: 100%; }
  #map { flex: 1; background: var(--bg); }
  #panel {
    width: 380px; max-width: 90vw; background: var(--panel);
    border-left: 1px solid #000; display: flex; flex-direction: column;
  }
  #panel.hidden { display: none; }
  #panel-close { align-self: flex-end; flex: none; background: none; border: 0;
    color: var(--muted); font-size: 20px; line-height: 1; cursor: pointer; padding: 8px 12px; }
  #panel-close:hover { color: var(--ink); }
  #panel-body { flex: 1; overflow-y: auto; padding: 4px 18px 40px; }
  #panel h1 { font-size: 16px; margin: 0 0 2px; }
  #panel .sub { color: var(--muted); font-size: 12px; margin-bottom: 12px; }
  .chip { display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: 12px;
          font-weight: 600; color: #fff; }
  .b-route { background: var(--route); } .b-accept { background: var(--accept); }
  .b-marginal { background: var(--marginal); color:#222; } .b-filter { background: var(--filter); }
  .score { font-size: 30px; font-weight: 700; }
  .dimwrap { margin: 5px 0; }
  .dimwrap.has { cursor: help; }
  .dim { display: grid; grid-template-columns: 92px 1fr 30px; gap: 6px; align-items: center;
         font-size: 12px; }
  .dimwrap.has .dim > span:first-child { border-bottom: 1px dotted #55606b; }
  .dim-why { display: none; color: var(--muted); font-size: 11.5px; margin: 4px 0 2px 92px;
             border-left: 2px solid #3a4552; padding-left: 8px; }
  .dimwrap.has:hover .dim-why, .dimwrap.show .dim-why { display: block; }
  .bar { height: 7px; background: #303a44; border-radius: 4px; overflow: hidden; }
  .bar > i { display: block; height: 100%; background: #5b9bd5; }
  .card { background: #171c22; border: 1px solid #2a323b; border-radius: 8px; padding: 10px 12px;
          margin: 8px 0; }
  .card h3 { margin: 0 0 4px; font-size: 14px; }
  .card .syn { color: var(--muted); font-size: 12.5px; }
  .links { margin-top: 6px; font-size: 12px; }
  .coord { font-family: ui-monospace, SFMono-Regular, monospace; color: #cdd6df; user-select: all;
           -webkit-user-select: all; }
  a { color: #7cb8ff; text-decoration: none; } a:hover { text-decoration: underline; }
  .tip { background: #23303a; border-left: 3px solid #5b9bd5; padding: 8px 10px; border-radius: 4px;
         font-size: 13px; margin-top: 10px; }
  #legend { position: absolute; z-index: 500; left: 10px; bottom: 14px; background: rgba(20,24,29,.9);
            padding: 8px 10px; border-radius: 8px; font-size: 12px; }
  #legend b { display:flex; align-items:center; gap:6px; font-weight:400; margin:2px 0; cursor:pointer; }
  #legend .dot { width: 11px; height: 11px; border-radius: 50%; }
  #legend .off { opacity: .35; text-decoration: line-through; }
  #legend .leg-head { display:flex; justify-content:space-between; gap:12px; color:var(--muted);
                      font-size:11px; margin-bottom:5px; }
  #legend .leg-head a { color:#7cb8ff; cursor:pointer; }
  #bar { position: absolute; z-index: 500; top: 10px; left: 10px; display: flex; gap: 6px;
         flex-wrap: wrap; max-width: calc(100% - 20px); }
  #bar input { background: var(--panel); border: 1px solid #333; color: var(--ink);
               padding: 7px 9px; border-radius: 6px; }
  #view { display: flex; border: 1px solid #333; border-radius: 6px; overflow: hidden; }
  #view button { background: var(--panel); color: var(--muted); border: 0; padding: 7px 11px;
                 cursor: pointer; font: inherit; font-size: 13px; }
  #view button + button { border-left: 1px solid #333; }
  #view button.on { background: #2b6cb0; color: #fff; font-weight: 600; }
  #locate { background: var(--panel); border: 1px solid #333; color: var(--ink);
            padding: 7px 9px; border-radius: 6px; cursor: pointer; font-size: 14px; }
  #locate.on { border-color: #00e5ff; }
  #sweep-arm { background: var(--panel); border: 1px solid #333; color: var(--ink);
               padding: 7px 11px; border-radius: 6px; cursor: pointer; font: inherit; font-size: 13px; }
  #sweep-arm.on { background: #2b6cb0; border-color: #2b6cb0; color: #fff; font-weight: 600; }
  #cov-toggle { background: var(--panel); border: 1px solid #333; color: var(--muted);
                padding: 7px 11px; border-radius: 6px; cursor: pointer; font: inherit; font-size: 13px; }
  #cov-toggle.on { color: var(--ink); border-color: #5b9bd5; }
  .camp-icon { font-size: 15px; text-align: center; line-height: 18px;
               filter: drop-shadow(0 1px 1px #000a); }
  .cgrid { display: grid; grid-template-columns: auto 1fr; gap: 5px 14px; font-size: 13px; margin: 10px 0; }
  .cgrid .ck { color: var(--muted); }
  #map.arming { cursor: crosshair; }
  #queue { position: absolute; z-index: 500; right: 10px; bottom: 14px; width: 230px;
           background: rgba(20,24,29,.92); border: 1px solid #2a323b; border-radius: 8px;
           padding: 8px 10px; font-size: 12px; }
  #queue .qh { color: var(--muted); font-size: 11px; margin-bottom: 5px; }
  #queue .qrow { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
  #queue .qrow .qx { margin-left: auto; color: var(--muted); cursor: pointer; }
  #queue .qbar { height: 4px; background: #303a44; border-radius: 3px; overflow: hidden; margin-top: 2px; }
  #queue .qbar > i { display: block; height: 100%; background: #5b9bd5; }
  #sweepbox { position:absolute; z-index:600; top:52px; left:10px; width:230px; background:var(--panel);
              border:1px solid #333; border-radius:8px; padding:10px 12px; font-size:13px; }
  #sweepbox .sw-row { display:flex; align-items:center; justify-content:space-between; gap:8px; margin:6px 0; }
  #sweepbox b { font-size:13px; } #sw-close { cursor:pointer; color:var(--muted); }
  #sweepbox .sw-mut { color:var(--muted); font-size:12px; }
  #sweepbox select, #sweepbox input[type=range] { background:var(--bg); color:var(--ink);
              border:1px solid #333; border-radius:5px; }
  #sw-go { width:100%; margin-top:8px; padding:8px; border:0; border-radius:6px; cursor:pointer;
           background:#2b6cb0; color:#fff; font-weight:600; }
  #sw-go[disabled] { background:#3a4552; cursor:default; }
  .empty { color: var(--muted); padding-top: 40px; text-align: center; }
  @media (max-width: 720px) {
    #app { flex-direction: column; }
    #map { height: 55vh; flex: none; }
    #app.nopanel #map { height: 100%; }
    #panel { width: 100%; max-width: 100%; height: 45vh; border-left: none; border-top: 1px solid #000; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="map">
    <div id="bar">
      <div id="view">
        <button data-v="moto" class="on">🏍 Moto</button>
        <button data-v="couple">🚗 Couple</button>
        <button data-v="lunch">🍴 Lunch</button>
        <button data-v="camping">🏕 Camping</button>
      </div>
      <input id="find" placeholder="filter towns…" autocomplete="off" />
      <button id="locate" title="center on my location">📍</button>
      <button id="sweep-arm" title="arm, then tap the map to sweep an area">＋ Sweep</button>
      <button id="cov-toggle" class="on" title="show/hide areas we've swept">▦ Areas</button>
    </div>
    <div id="sweepbox" hidden>
      <div class="sw-row"><b>Sweep an area</b><span id="sw-close">✕</span></div>
      <div id="sw-center" class="sw-mut"></div>
      <div class="sw-row"><span>radius</span>
        <input id="sw-radius" type="range" min="10" max="60" step="5" value="30" />
        <span id="sw-rlabel">30 mi</span></div>
      <div id="sw-preview" class="sw-mut">…</div>
      <div class="sw-mut" style="font-size:11px">scores both moto &amp; couple</div>
      <button id="sw-go">Add to queue</button>
    </div>
    <div id="queue" hidden></div>
    <div id="legend"></div>
  </div>
  <div id="panel">
    <button id="panel-close" title="close · see the full map">✕</button>
    <div id="panel-body"><div class="empty">Click a town to see its verdict.</div></div>
  </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const API = (localStorage.getItem("MOTELDB_API") || "").replace(/\/$/, "");  // same-origin server
const BANDS = {
  "route-worthy": ["b-route", "var(--route)", "Route-worthy"],
  "acceptable":   ["b-accept", "var(--accept)", "Acceptable"],
  "marginal":     ["b-marginal", "var(--marginal)", "Marginal"],
  "filter-out":   ["b-filter", "var(--filter)", "Filter-out"],
};
const DIMS = [
  ["independence_character", "lodging", 2], ["price_tier", "price", 1], ["review_quality", "reviews", 1],
  ["food_proximity_quality", "food", 2], ["food_recency", "recency", 1],
  ["town_charm", "charm", 2], ["riding_context", "riding", 1],
];
const map = L.map("map", { zoomControl: false }).setView([44, -90], 5);
L.control.zoom({ position: "topright" }).addTo(map);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  attribution: "&copy; OpenStreetMap &copy; CARTO", maxZoom: 19,
}).addTo(map);

const off = new Set();           // bands toggled off (moto/couple views)
let view = "moto";               // moto | couple | lunch  (one at a time)
let rows = [], markers = [];
const LUNCH_MIN = 1.5;           // food_proximity_quality (of 2) for a town to count as a lunch stop
const foodProx = r => (r.scores || {}).food_proximity_quality ?? 0;
const foodColor = fp => (fp >= 2 ? "#2e7d32" : "#9ccc65");

function color(band) { return getComputedStyle(document.documentElement)
  .getPropertyValue((BANDS[band] || ["", "#888"])[1].replace(/var\((.*)\)/, "$1").trim() || "--muted") || "#888"; }

function sv(lat, lon) { return `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${lat},${lon}`; }
function gmaps(q) { return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`; }

function render(r) {
  const [cls, , label] = BANDS[r.band] || ["", "", r.band];
  const bl = r.best_lodging || {};
  const dims = (r.scores || {}), notes = (r.notes || {});
  const dimRows = DIMS.map(([k, lbl, max]) => {
    const v = dims[k] ?? 0, pct = Math.round((v / max) * 100);
    const has = notes[k] ? "has" : "";
    const why = notes[k] ? `<div class="dim-why">${notes[k]}</div>` : "";
    return `<div class="dimwrap ${has}"><div class="dim"><span>${lbl}</span><span class="bar"><i style="width:${pct}%"></i></span><span>${v}/${max}</span></div>${why}</div>`;
  }).join("");
  const hint = Object.keys(notes).length
    ? `<div style="font-size:11px;color:var(--muted);margin:2px 0 4px">hover / tap a dimension for why</div>` : "";
  const coord = (la, lo) => `<span class="coord" title="tap to select for your GPS">${(+la).toFixed(5)}, ${(+lo).toFixed(5)}</span>`;
  const plinks = (name, la, lo) => {
    const out = [`<a href="${gmaps(name + ', ' + r.town + ', ' + r.state)}" target="_blank">Maps ↗</a>`];
    if (la != null) out.push(`<a href="${sv(la, lo)}" target="_blank">Street View ↗</a>`, coord(la, lo));
    return `<div class="links">${out.join(" · ")}</div>`;
  };
  const foods = (r.food || []).map(f =>
    `<div class="card"><h3>🍴 ${f.name || ""}</h3><div class="syn">${f.synthesis || ""}</div>
     ${plinks(f.name, f.lat, f.lon)}</div>`).join("");
  const lodging = bl.name ? `<div class="card"><h3>🛏 ${bl.name} ${bl.soft_brand ? "· soft-brand" : ""}</h3>
      <div class="syn">${bl.synthesis || ""}</div>${plinks(bl.name, bl.lat, bl.lon)}</div>` : "";
  showPanel(true);
  document.getElementById("panel-body").innerHTML = `
    <h1>${r.town}, ${r.state}</h1>
    <div class="sub">${r.mode || "moto"} · evaluated ${(r.evaluated_at || "").slice(0,10)}${me ? ` · ${Math.round(distMi(me.lat, me.lon, r.lat, r.lon))} mi from you` : ""} · ${coord(r.lat, r.lon)}</div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
      <span class="score">${r.total}</span><span style="color:var(--muted)">/10</span>
      <span class="chip ${cls}">${label}</span>
      <a style="margin-left:auto" href="https://www.google.com/maps/search/?api=1&query=${r.lat},${r.lon}" target="_blank">map ↗</a>
    </div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:10px">${r.reason || ""}</div>
    ${hint}${dimRows}
    ${lodging}${foods}
    ${r.tip ? `<div class="tip">💡 ${r.tip}</div>` : ""}`;
}

function draw(fit = true) {   // fit=false for background poll refreshes so they don't yank the view
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  if (view === "camping") return;   // camps live in campLayer, loaded by bounds via fetchCamps()
  const q = document.getElementById("find").value.toLowerCase();
  const hit = r => !q || (r.town + " " + r.state).toLowerCase().includes(q);
  const lunch = view === "lunch";
  let shown;
  if (lunch) {
    // Food is scored the same regardless of trip mode → one marker per town, best food wins.
    const byTown = new Map();
    for (const r of rows) {
      if (foodProx(r) < LUNCH_MIN) continue;
      const k = r.town + "|" + r.state;
      if (!byTown.has(k) || foodProx(r) > foodProx(byTown.get(k))) byTown.set(k, r);
    }
    shown = [...byTown.values()].filter(hit);
  } else {
    shown = rows.filter(r => r.mode === view && !off.has(r.band) && hit(r));
  }
  shown.forEach(r => {
    const m = L.circleMarker([r.lat, r.lon], {
      radius: lunch ? 5 + foodProx(r) * 3 : 5 + (r.total || 0) * 0.7,
      color: "#0009", weight: 1,
      fillColor: lunch ? foodColor(foodProx(r)) : color(r.band), fillOpacity: 0.9,
    }).addTo(map).bindTooltip(
      lunch ? `${r.town} · 🍴 ${foodProx(r)}/2` : `${r.town} · ${r.total}`,
      { direction: "top" });
    m.on("click", (ev) => { L.DomEvent.stopPropagation(ev); render(r); });
    markers.push(m);
  });
  if (fit && shown.length && !q) map.fitBounds(L.latLngBounds(shown.map(r => [r.lat, r.lon])).pad(0.2));
}

function legend() {
  const box = document.getElementById("legend");
  if (view === "camping") {
    box.innerHTML =
      `<div class="leg-head">camp spots (camping-db)</div>` +
      `<b><span class="dot" style="background:#2e7d32"></span>🏕 click a pin for details</b>` +
      `<b style="color:var(--muted)">zoom in to load camps</b>`;
    return;
  }
  if (view === "lunch") {
    box.innerHTML =
      `<div class="leg-head">local food (lunch stops)</div>` +
      `<b><span class="dot" style="background:#2e7d32"></span>Great · 2/2</b>` +
      `<b><span class="dot" style="background:#9ccc65"></span>Good · 1.5+</b>`;
    return;
  }
  box.innerHTML =
    `<div class="leg-head"><span>categories · click to hide</span>` +
    `<span><a data-all="1">all</a> · <a data-all="0">none</a></span></div>` +
    Object.entries(BANDS).map(([b, [, c, label]]) =>
      `<b data-b="${b}" class="${off.has(b) ? "off" : ""}">` +
      `<span class="dot" style="background:${c}"></span>${label}</b>`).join("");
  box.querySelectorAll("b[data-b]").forEach(el => el.onclick = () => {
    const b = el.dataset.b; off.has(b) ? off.delete(b) : off.add(b);
    el.classList.toggle("off"); draw();
  });
  box.querySelectorAll("a[data-all]").forEach(el => el.onclick = () => {
    off.clear();
    if (el.dataset.all === "0") Object.keys(BANDS).forEach(b => off.add(b));
    legend(); draw();
  });
}

document.querySelectorAll("#view button").forEach(btn => btn.onclick = () => {
  view = btn.dataset.v;
  document.querySelectorAll("#view button").forEach(b => b.classList.toggle("on", b === btn));
  if (view === "camping") fetchCamps(); else campLayer.clearLayers();
  legend(); draw();
});

document.getElementById("find").oninput = draw;

// tap-to-toggle a dimension's "why" (touch devices where hover doesn't exist)
document.getElementById("panel").addEventListener("click", (e) => {
  const w = e.target.closest(".dimwrap.has");
  if (w) w.classList.toggle("show");
});

// ---- click-to-sweep ----
const $ = id => document.getElementById(id);
const BANDCLR = { "route-worthy": "#2e7d32", "acceptable": "#1565c0",
                  "marginal": "#f9a825", "filter-out": "#b0392b" };
let sweepCircle = null, sweepCenter = null, prevT;

function openSweep(latlng) {
  sweepCenter = latlng;
  $("sweepbox").hidden = false;
  $("sw-center").textContent = `center ${latlng.lat.toFixed(4)}, ${latlng.lng.toFixed(4)}`;
  drawCircle(); preview();
}
function drawCircle() {
  if (sweepCircle) map.removeLayer(sweepCircle);
  sweepCircle = L.circle(sweepCenter, { radius: (+$("sw-radius").value) * 1609.34,
    color: "#2b6cb0", weight: 1, fillColor: "#2b6cb0", fillOpacity: 0.08 }).addTo(map);
}
function closeSweep() {
  $("sweepbox").hidden = true;
  if (sweepCircle) { map.removeLayer(sweepCircle); sweepCircle = null; }
}
function preview() {
  clearTimeout(prevT);
  prevT = setTimeout(() => {
    $("sw-preview").textContent = "…";
    const qs = new URLSearchParams({ lat: sweepCenter.lat, lon: sweepCenter.lng, radius: $("sw-radius").value });
    fetch(`${API}/api/preview?${qs}`).then(r => r.json())
      .then(d => $("sw-preview").innerHTML = `${d.towns} towns · <b>${d.to_score} to score</b>`)
      .catch(() => $("sw-preview").textContent = "preview failed");
  }, 250);
}
$("sw-radius").oninput = () => { $("sw-rlabel").textContent = $("sw-radius").value + " mi"; drawCircle(); preview(); };
$("sw-close").onclick = closeSweep;
$("sw-go").onclick = () => {
  fetch(`${API}/api/sweep_jobs`, { method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ lat: sweepCenter.lat, lon: sweepCenter.lng, radius: +$("sw-radius").value }) })
    .then(() => { closeSweep(); refreshJobs(); startPolling(); });
};

// ---- sweep queue + coverage layer ----
// Sweeps run server-side (a background worker drains the queue), so you can stack
// several areas and walk away. Each job is also drawn as a "swept area" circle.
let jobs = [], showCov = true, pollT = null, lastActive = false;
const covLayer = L.layerGroup().addTo(map);
const JOB_CLR = { done: "#2e7d32", running: "#2b6cb0", error: "#b0392b", pending: "#8a94a0" };

function refreshJobs() {
  return fetch(`${API}/api/sweep_jobs`).then(r => r.json()).then(js => {
    jobs = js; renderQueue(); drawCoverage();
    const active = jobs.some(j => j.status === "pending" || j.status === "running");
    if (active || lastActive) load(false);   // lastActive catches the final done → pull the last towns (no refit)
    lastActive = active;
    if (active) startPolling(); else stopPolling();
  }).catch(() => {});
}
function startPolling() { if (!pollT) pollT = setInterval(refreshJobs, 3000); }
function stopPolling() { if (pollT) { clearInterval(pollT); pollT = null; } }

function drawCoverage() {
  covLayer.clearLayers();
  if (!showCov) return;
  jobs.forEach(j => {
    const c = JOB_CLR[j.status] || "#8a94a0";
    L.circle([j.lat, j.lon], { radius: j.radius_mi * 1609.34, color: c, weight: 1,
      fillColor: c, fillOpacity: j.status === "done" ? 0.05 : 0.10, interactive: false,
      dashArray: j.status === "pending" ? "5,5" : null }).addTo(covLayer);
  });
}

function renderQueue() {
  const show = jobs.filter(j => j.status !== "done").concat(
    jobs.filter(j => j.status === "done").slice(0, 3));   // active + a few recent
  if (!show.length) { $("queue").hidden = true; return; }
  const icon = { pending: "⏳", running: "▶", done: "✓", error: "✕" };
  $("queue").hidden = false;
  $("queue").innerHTML = `<div class="qh">sweep queue</div>` + show.map(j => {
    const pct = j.towns_total ? Math.round((j.towns_done / j.towns_total) * 100) : 0;
    const label = j.status === "running" ? `${j.towns_done}/${j.towns_total || "…"}`
                : j.status === "pending" ? "queued" : j.status;
    const x = j.status === "pending" ? `<span class="qx" data-cancel="${j.id}" title="cancel">✕</span>` : "";
    const bar = j.status === "running" ? `<div class="qbar"><i style="width:${pct}%"></i></div>` : "";
    return `<div><div class="qrow"><span>${icon[j.status] || "•"}</span>` +
           `<span>${(+j.radius_mi)}mi · ${label}</span>${x}</div>${bar}</div>`;
  }).join("");
}

$("queue").addEventListener("click", e => {
  const id = e.target.dataset.cancel;
  if (id) fetch(`${API}/api/sweep_jobs/${id}`, { method: "DELETE" }).then(refreshJobs);
});
$("cov-toggle").onclick = () => {
  showCov = !showCov;
  $("cov-toggle").classList.toggle("on", showCov);
  drawCoverage();
};

// ---- camping layer (sibling camping-db, via same-origin /api/camps proxy) ----
// The "camping" view loads camps for the current map bounds (pan-to-load).
// Below CAMP_MINZOOM the bbox spans too many camps, so we wait for a zoom-in
// rather than dumping thousands of pins.
let campFetchT = null;
const campLayer = L.layerGroup().addTo(map);
const CAMP_MINZOOM = 8;
const CAMP_TYPE = { NF: "National Forest", BLM: "BLM", COE: "Corps of Engineers",
  SP: "State Park", SF: "State Forest", CP: "County Park", RV: "RV Park", MP: "Municipal Park" };

function fetchCamps() {
  if (view !== "camping") return;
  if (map.getZoom() < CAMP_MINZOOM) { campLayer.clearLayers(); return; }
  const b = map.getBounds();
  const bbox = [b.getWest(), b.getSouth(), b.getEast(), b.getNorth()].map(n => n.toFixed(4)).join(",");
  fetch(`${API}/api/camps?bbox=${bbox}`).then(r => r.json()).then(camps => {
    campLayer.clearLayers();
    camps.forEach(c => {
      if (c.lat == null || c.lon == null) return;
      L.marker([c.lat, c.lon], { icon: L.divIcon({ className: "camp-icon", html: "🏕", iconSize: [18, 18] }) })
        .addTo(campLayer)
        .on("click", ev => { L.DomEvent.stopPropagation(ev); renderCamp(c); });
    });
  }).catch(() => {});
}

function renderCamp(c) {
  showPanel(true);
  const label = CAMP_TYPE[c.type] || c.type || "camp";
  const dist = me ? ` · ${Math.round(distMi(me.lat, me.lon, c.lat, c.lon))} mi from you` : "";
  const pair = (k, v) => (v != null && v !== "") ? `<span class="ck">${k}</span><span>${v}</span>` : "";
  document.getElementById("panel-body").innerHTML = `
    <h1>🏕 ${c.camp || c.name || "Campground"}</h1>
    <div class="sub">${label}${c.town ? " · " + c.town : ""}, ${c.state || ""}${dist} · ${(+c.lat).toFixed(5)}, ${(+c.lon).toFixed(5)}</div>
    <div class="cgrid">
      ${pair("fee", c.fee || "free")}${pair("sites", c.sites)}${pair("water", c.water)}
      ${pair("devel", c.devel)}${pair("season", c.season)}
    </div>
    <div class="links">
      <a href="https://www.google.com/maps/search/?api=1&query=${c.lat},${c.lon}" target="_blank">Maps ↗</a>
      ${c.url ? ` · <a href="${c.url}" target="_blank">Site ↗</a>` : ""}
    </div>`;
}

map.on("moveend", () => { if (view === "camping") { clearTimeout(campFetchT); campFetchT = setTimeout(fetchCamps, 300); } });
// Sweeping is an explicit mode: arm it, then one map tap opens the sweep box.
// Without this, every stray tap (easy to do on touch) stole the tap from a town bubble.
let armed = false;
function setArmed(on) {
  armed = on;
  $("sweep-arm").classList.toggle("on", on);
  $("map").classList.toggle("arming", on);
}
$("sweep-arm").onclick = () => setArmed(!armed);

// Close the details panel to see the map full-screen; a town click reopens it.
function showPanel(on) {
  $("panel").classList.toggle("hidden", !on);
  $("app").classList.toggle("nopanel", !on);
  map.invalidateSize();  // panel width changed — let Leaflet refill the map
}
$("panel-close").onclick = () => showPanel(false);
map.on("click", e => { if (armed) { setArmed(false); openSweep(e.latlng); } });
// keep clicks on the UI overlays from falling through to the map
["sweepbox", "bar", "legend", "queue"].forEach(id => {
  const el = $(id);
  if (el) { L.DomEvent.disableClickPropagation(el); L.DomEvent.disableScrollPropagation(el); }
});

// ---- user location (reference point) ----
let me = null, meMarker = null;
function distMi(la1, lo1, la2, lo2) {
  const R = 3958.8, p1 = la1 * Math.PI / 180, p2 = la2 * Math.PI / 180;
  const dp = (la2 - la1) * Math.PI / 180, dl = (lo2 - lo1) * Math.PI / 180;
  const h = Math.sin(dp / 2) ** 2 + Math.cos(p1) * Math.cos(p2) * Math.sin(dl / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(h));
}
function locateMe(pan) {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    me = { lat: pos.coords.latitude, lon: pos.coords.longitude };
    if (meMarker) map.removeLayer(meMarker);
    meMarker = L.circleMarker([me.lat, me.lon], {          // kept out of markers[] so draw() won't clear it
      radius: 7, color: "#fff", weight: 2, fillColor: "#00e5ff", fillOpacity: 0.95,
    }).addTo(map).bindTooltip("You are here", { direction: "top" });
    document.getElementById("locate").classList.add("on");
    if (pan) map.setView([me.lat, me.lon], 9);
  }, () => {}, { enableHighAccuracy: false, timeout: 8000, maximumAge: 600000 });
}
document.getElementById("locate").onclick = () => me ? map.setView([me.lat, me.lon], 9) : locateMe(true);
locateMe(false);   // silent attempt on load (browser prompts once); button re-centers after

function load(fit = true) {
  return fetch(`${API}/api/verdicts`).then(r => r.json())
    .then(data => { rows = data; legend(); draw(fit); })
    .catch(e => { document.getElementById("panel-body").innerHTML =
      `<div class="empty">Couldn't reach the server.<br><br>${e}</div>`; });
}
load();
refreshJobs();   // show any queued/running sweeps + coverage circles from a prior session
</script>
</body>
</html>
